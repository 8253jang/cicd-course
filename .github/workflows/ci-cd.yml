name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-security:
    runs-on:
      - self-hosted
      - Linux
      - X64

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      # 소스 코드 다운로드
      - name: Checkout code
        uses: actions/checkout@v4

      # Python 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 프로젝트 의존성 설치
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements-dev.txt
          pip3 install -r requirements.txt

      # Ruff 정적 분석
      - name: Run Ruff
        run: ruff check .

      # Black 코드 포맷 검사
      - name: Run Black
        run: black --check .

      # 단위 테스트 및 코드 커버리지 검사
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ -v \
            --cov=settlement \
            --cov-report=term-missing \
            --cov-fail-under=80

      # Trivy 파일 시스템 취약점 검사
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      # Docker 이미지 생성
      - name: Build Docker image
        run: |
          docker build -t settlement:latest .

      # 생성된 이미지 확인
      - name: Verify Docker image
        run: |
          docker images settlement