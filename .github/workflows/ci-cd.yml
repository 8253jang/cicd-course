name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # 1. 囀萄 ヶ韓 匐餌
  # ==========================================
  lint-and-format:
    runs-on:
      - self-hosted
      - Linux
      - X64

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements-dev.txt
          pip3 install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

  # ==========================================
  # 2. 纔蝶お 塽 醴幗葬雖
  # ==========================================
  test-and-coverage:
    needs: lint-and-format

    runs-on:
      - self-hosted
      - Linux
      - X64

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements-dev.txt
          pip3 install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ -v \
            --cov=settlement \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ==========================================
  # 3. 爾寰 匐餌 塽 Docker 檜嘐雖 儅撩
  # ==========================================
  build-and-scan:
    needs: test-and-coverage

    runs-on:
      - self-hosted
      - Linux
      - X64

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      - name: Build Docker image
        run: |
          docker build -t settlement:latest .

      - name: Verify Docker image
        run: |
          docker images settlement

  # ==========================================
  # 4. Kubernetes 寡ん
  # ==========================================
  kubernetes-test:
    needs: build-and-scan

    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Load Docker image into Kind
        run: |
          kind load docker-image settlement:latest --name settlement-local

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Check Deployment Status
        run: |
          kubectl rollout status deployment/settlement

      - name: Check Pods
        run: |
          kubectl get pods -o wide

      - name: Check Services
        run: |
          kubectl get svc